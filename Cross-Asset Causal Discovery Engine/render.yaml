services:
  - type: web
    name: causal-discovery-api
    runtime: python
    rootDir: Cross-Asset Causal Discovery Engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Read-only hosted demo: serve the committed snapshot, refuse the
      # pipeline/LLM-triggering endpoints (no Ollama, ephemeral filesystem).
      - key: DEMO_MODE
        value: "true"
      - key: CAUSAL_ENGINE_DB
        value: db/causal_engine.db
